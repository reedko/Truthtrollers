<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TruthTrollers PDF Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body,
      #wrap {
        margin: 0;
        height: 100%;
      }
      #wrap {
        position: relative;
        background: #fff;
      }
      #pdf {
        border: 0;
        width: 100%;
        height: 100%;
      }
      #popup-root {
        position: fixed;
        inset: auto 16px 16px auto;
        z-index: 2147483647;
      }
      #scrape-status {
        display: none;
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 2147483647;
        padding: 10px 14px;
        border: 1px solid rgba(14, 165, 233, 0.75);
        border-radius: 999px;
        background: rgba(8, 20, 38, 0.92);
        color: #bae6fd;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        font: 600 13px/1.2 system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="popup-root"></div>
    <div id="scrape-status" role="status" aria-live="polite"></div>
    <div id="wrap"><embed id="pdf" type="application/pdf" /></div>

    <!-- external scripts only (no inline) -->
    <script src="viewer.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
